version: "3.9"

services:
  disaster-response-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: disaster-response-ai
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-llama-3.3-70b-versatile}
      - SECONDARY_MODEL=${SECONDARY_MODEL:-llama-3.1-8b-instant}
      - OUTPUT_DIR=/app/output
      - CHECKPOINT_DIR=/app/checkpoints
      - FAISS_INDEX_DIR=/app/faiss_index
      - KNOWLEDGE_BASE_DIR=/app/knowledge_base
      - APP_ENV=production
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    volumes:
      - ./output:/app/output
      - ./checkpoints:/app/checkpoints
      - ./faiss_index:/app/faiss_index
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - disaster-net

  # Optional: Nginx reverse proxy for production (HTTPS + mobile)
  nginx:
    image: nginx:alpine
    container_name: disaster-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - disaster-response-api
    restart: unless-stopped
    networks:
      - disaster-net
    profiles:
      - production  # only starts with: docker-compose --profile production up

networks:
  disaster-net:
    driver: bridge
