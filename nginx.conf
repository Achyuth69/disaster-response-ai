server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS in production (uncomment when SSL is set up)
    # return 301 https://$host$request_uri;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Mobile: allow large uploads
    client_max_body_size 10M;

    # API proxy
    location /api/ {
        proxy_pass http://disaster-response-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://disaster-response-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # UI static files — cache aggressively
    location /ui/ {
        proxy_pass http://disaster-response-api:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # Root redirect
    location / {
        proxy_pass http://disaster-response-api:8000;
        proxy_set_header Host $host;
    }
}

# HTTPS server (uncomment and configure when you have SSL certs)
