services:
  - type: web
    name: disaster-response-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_api.py --host 0.0.0.0 --port $PORT --prod
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PRIMARY_MODEL
        value: llama-3.3-70b-versatile
      - key: SECONDARY_MODEL
        value: llama-3.1-8b-instant
